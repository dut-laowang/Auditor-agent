run_name: pilot_research_coding_database
default_llm: gpt-4o-mini
judge_llm: gpt-4o-mini
samples_per_scenario: 3
scenarios:
  research:
    dataset: multiagentbench/research/research_main.jsonl
    sample_ids: [1, 2, 3]
    topologies: [graph, star, tree]
  coding:
    dataset: multiagentbench/coding/coding_main.jsonl
    sample_ids: [1, 2, 3]
    topologies: [graph, star, tree]
  database:
    dataset: multiagentbench/database/database_main.jsonl
    sample_ids: [1, 2, 3]
    topologies: [graph, star, tree]
environment_overrides:
  research:
    type: Research
    max_iterations: 3
  coding:
    type: Coding
    max_iterations: 3
    workspace_dir: workspace
  database:
    type: DB
    max_iterations: 3
output:
  save_generated_configs: true
  save_trajectory: true

