run_name: benchmark384_multiscenario
api:
  provider: openai
  model_name: gpt-4o-mini
  base_url: https://yunai.chat/v1
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_tokens: 1024
default_llm: gpt-4o-mini
judge_llm: gpt-4o-mini
scenarios:
  research:
    dataset: multiagentbench/research/research_main.jsonl
    sample_ids: [1, 2]
    topologies: [graph, star, tree]
  coding:
    dataset: multiagentbench/coding/coding_main.jsonl
    sample_ids: [1, 2]
    topologies: [graph, star, tree]
  minecraft:
    dataset: multiagentbench/minecraft/minecraft_main.jsonl
    sample_ids: [1, 2]
    topologies: [graph, star, tree]
  bargaining:
    dataset: multiagentbench/bargaining/bargaining_main.jsonl
    sample_ids: [1, 2]
    topologies: [graph, star, tree]
environment_overrides:
  research:
    type: Research
    max_iterations: 3
  coding:
    type: Coding
    max_iterations: 3
    workspace_dir: workspace
  minecraft:
    type: Base
    max_iterations: 2
  bargaining:
    type: Base
    max_iterations: 4
output:
  save_generated_configs: true
  save_trajectory: true
